<div id="main" [ngClass]="styleLayout">
  <div id="titulo">
    <app-titulo-main [title]="mainTitle"></app-titulo-main>
  </div>

  <div class="contenido-dinamico">
    <div class="texto">
      <app-cuerpo-main
        [h2_1]="Title1"
        [h2_2]="Title2"
        [h2_3]="Title3">
      </app-cuerpo-main>
    </div>

    <div class="imagen">
      <app-img-main [imgSrc]="image"></app-img-main>
    </div>
  </div>
</div>
